<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#6E40C9"/>
      <stop offset="100%" stop-color="#34D058"/>
    </linearGradient>
  </defs>
  <rect width="720" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="720" height="4" rx="2" fill="url(#accent)"/>

  <!-- Search icon -->
  <g transform="translate(60, 70)">
    <circle cx="30" cy="30" r="22" fill="none" stroke="#4285F4" stroke-width="3"/>
    <line x1="46" y1="46" x2="58" y2="58" stroke="#4285F4" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Hermes wing icon (simplified) -->
  <g transform="translate(580, 70)">
    <path d="M 5 30 Q 20 10 40 20 Q 30 25 25 35 Q 35 30 45 35 Q 35 40 30 45 Q 45 40 55 50" 
          fill="none" stroke="#6E40C9" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="60" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="38" font-weight="bold" fill="#F0F6FC">
    SuearchHermes
  </text>

  <!-- Tagline -->
  <text x="60" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="16" fill="#8B949E">
    Google Search via Antigravity (agy) for Hermes Agent
  </text>

  <!-- Badges row -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="80" height="20" rx="3" fill="#1F6FEB" opacity="0.9"/>
    <text x="40" y="14" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Free</text>

    <rect x="88" y="0" width="120" height="20" rx="3" fill="#238636" opacity="0.9"/>
    <text x="148" y="14" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">No API Key</text>

    <rect x="216" y="0" width="100" height="20" rx="3" fill="#6E40C9" opacity="0.9"/>
    <text x="266" y="14" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Google</text>
  </g>
</svg>
